spring.application.name=reimbursement-backend

# =====================
# Database Configuration
# =====================
spring.datasource.url=jdbc:mysql://localhost:3306/reimbursement_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Root@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =====================
# JPA / Hibernate
# =====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# =====================
# Server
# =====================
server.port=8080

# =====================
# JWT Configuration
# =====================
app.jwt.secret=reimbursementSecretKey2024VeryLongSecretKeyForJWT
app.jwt.expiration=86400000

# =====================
# Mail Configuration
# =====================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# =====================
# File Upload
# =====================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.file.upload-dir=./uploads

# =====================
# CORS
# =====================
app.cors.allowed-origins=http://localhost:3000
